<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KNC · Abertura de Obra</title>
<style>
  :root{
    --navy:#1A2A45; --navy-2:#22365a; --orange:#E8722A; --blue:#2E75B6;
    --green:#2E9E5B; --yellow:#E0A800; --red:#D14343; --grey:#6B7280;
    --line:#E2E6EC; --bg:#F4F6F9; --card:#FFFFFF; --ink:#1B2230; --soft:#F7F9FC;
    --radius:14px; --shadow:0 1px 2px rgba(20,30,55,.05),0 8px 24px rgba(20,30,55,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%}
  /* ===== Top bar ===== */
  header{position:sticky;top:0;z-index:50;background:var(--navy);
    background:linear-gradient(180deg,#1f3050,#16243d);color:#fff;
    box-shadow:0 2px 14px rgba(10,18,35,.28)}
  .bar{max-width:1180px;margin:0 auto;padding:11px 18px;display:flex;align-items:center;gap:14px}
  .logo{width:36px;height:36px;border-radius:8px;flex:0 0 auto;object-fit:contain;background:#fff;padding:2px}
  .brand{display:flex;flex-direction:column;line-height:1.15}
  .brand b{font-size:15px;letter-spacing:.3px}
  .brand span{font-size:11px;color:#b9c4d6;letter-spacing:1.5px;text-transform:uppercase}
  .obra-pick{margin-left:auto;display:flex;align-items:center;gap:8px}
  .obra-pick select{background:#22365a;color:#fff;border:1px solid #34507e;border-radius:9px;
    padding:8px 11px;font-size:13px;max-width:46vw}
  .cloud{font-size:11px;padding:4px 9px;border-radius:20px;display:flex;align-items:center;gap:5px;
    background:rgba(255,255,255,.1);color:#cdd8e8}
  .cloud .dot{width:7px;height:7px;border-radius:50%;background:var(--yellow)}
  .cloud.live .dot{background:#49d17f}
  /* ===== Save indicator ===== */
  .cloud.saving .dot{background:var(--blue);animation:sp .7s linear infinite}
  .cloud.saving .dot{width:10px;height:10px;border:2px solid #cdd8e8;border-top-color:var(--blue);border-radius:50%;background:transparent!important}
  .cloud.saved .dot{background:#49d17f!important;animation:none}
  .cloud .save-label{transition:opacity .2s}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* ===== Tabs ===== */
  nav{background:#16243d;border-top:1px solid #2a3f63}
  .tabs{max-width:1180px;margin:0 auto;display:flex;gap:2px;padding:0 10px;overflow-x:auto}
  .tab{flex:0 0 auto;color:#9fb0c9;background:none;border:none;padding:13px 16px;font-size:13.5px;
    font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
  .tab.active{color:#fff;border-bottom-color:var(--orange)}
  .tab:disabled{opacity:.4;cursor:not-allowed}
  /* ===== Layout ===== */
  main{max-width:1180px;margin:0 auto;padding:20px 16px 80px}
  .view{display:none;animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.8px;color:var(--navy);
    display:flex;align-items:center;gap:9px;margin-bottom:14px}
  .card h2::before{content:"";width:4px;height:16px;background:var(--orange);border-radius:3px}
  .sub{font-size:12.5px;color:var(--grey);margin-top:-8px;margin-bottom:14px}
  /* ===== Fields ===== */
  .grid{display:grid;gap:13px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr 1fr}
  .g4{grid-template-columns:repeat(4,1fr)}
  label{display:block;font-size:11.5px;font-weight:700;color:var(--grey);
    text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
  input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;font-size:14.5px;font-family:inherit;color:var(--ink);background:#fff}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);
    box-shadow:0 0 0 3px rgba(46,117,182,.13)}
  textarea{resize:vertical;min-height:60px}
  /* ===== Tables ===== */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:12px}
  table{width:100%;border-collapse:collapse;min-width:560px}
  th{background:var(--navy);color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:.5px;
    text-align:left;padding:10px 11px;font-weight:700;white-space:nowrap}
  td{padding:6px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  td input,td select{border:1px solid transparent;border-radius:7px;padding:8px 9px;font-size:13.5px;background:#fbfcfd}
  td input:focus,td select:focus{background:#fff;border-color:var(--blue)}
  .row-del{background:none;border:none;color:var(--red);font-size:19px;cursor:pointer;
    padding:0 4px;line-height:1;opacity:.6}
  .row-del:hover{opacity:1}
  .add-row{margin-top:11px;background:var(--soft);border:1px dashed #c6cfdd;color:var(--navy);
    border-radius:10px;padding:10px 14px;font-size:13.5px;font-weight:600;cursor:pointer;width:100%}
  .add-row:hover{background:#eef2f8;border-color:var(--blue)}
  /* ===== Checklist ===== */
  .chk{display:flex;align-items:flex-start;gap:11px;padding:11px 12px;border:1px solid var(--line);
    border-radius:10px;margin-bottom:8px;background:#fff;cursor:pointer;transition:.15s}
  .chk:hover{border-color:#c6cfdd}
  .chk.done{background:#f0faf4;border-color:#bce6cd}
  .chk input{width:20px;height:20px;flex:0 0 auto;margin-top:1px;accent-color:var(--green)}
  .chk .ci-main{flex:1;min-width:0}
  .chk .ci-item{font-weight:600;font-size:14px}
  .chk.done .ci-item{color:var(--green)}
  .chk .ci-meta{font-size:11.5px;color:var(--grey);margin-top:2px}
  .chk .ci-resp{font-size:11px;background:var(--soft);color:var(--navy);border:1px solid var(--line);
    padding:3px 8px;border-radius:20px;white-space:nowrap;flex:0 0 auto;font-weight:600}
  /* ===== Buttons ===== */
  .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
  .btn{border:none;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer}
  .btn-primary{background:var(--orange);color:#fff}
  .btn-primary:hover{background:#d4641f}
  .btn-ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--blue)}
  /* ===== Painel ===== */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;border-top:4px solid var(--blue)}
  .kpi .k-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);font-weight:700}
  .kpi .k-val{font-size:21px;font-weight:800;color:var(--navy);margin-top:4px;line-height:1.1}
  .kpi.green{border-top-color:var(--green)} .kpi.orange{border-top-color:var(--orange)} .kpi.red{border-top-color:var(--red)}
  .etapa-bar{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
  .etapa-bar:last-child{border-bottom:none}
  .etapa-bar .e-name{flex:0 0 40%;font-weight:600;font-size:14px}
  .etapa-bar .e-track{flex:1;height:22px;background:#eef1f5;border-radius:11px;overflow:hidden;position:relative}
  .etapa-bar .e-fill{height:100%;border-radius:11px;display:flex;align-items:center;justify-content:flex-end;
    padding-right:8px;color:#fff;font-size:11px;font-weight:700;transition:width .5s ease;min-width:30px}
  .legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .legend span{font-size:11px;font-weight:700;color:#fff;padding:4px 10px;border-radius:20px}
  /* ===== Liberação ===== */
  .lib-final{background:linear-gradient(135deg,#1f3050,#16243d);color:#fff;border-radius:14px;
    padding:18px;text-align:center;margin-top:10px}
  .lib-final.go{background:linear-gradient(135deg,#1f7a44,#176336)}
  .lib-final b{font-size:17px;display:block;margin-bottom:4px}
  .lib-final small{color:#cdd8e8;font-size:12.5px}
  /* ===== Toast ===== */
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120px);
    background:var(--navy);color:#fff;padding:13px 22px;border-radius:12px;font-size:14px;font-weight:600;
    box-shadow:0 10px 30px rgba(0,0,0,.3);transition:transform .35s cubic-bezier(.2,.9,.3,1.3);z-index:100;max-width:90vw}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--red)}
  /* ===== Empty ===== */
  .empty{text-align:center;padding:50px 20px;color:var(--grey)}
  .empty .e-emoji{width:54px;height:54px;border-radius:14px;margin:0 auto 14px;
    background:conic-gradient(from 200deg,#2EC5CE,#2E75B6,#1A2A45,#E8722A,#E84343,#E8722A,#2EC5CE);opacity:.85}
  .empty b{display:block;color:var(--navy);font-size:16px;margin-bottom:6px}
  /* ===== RDO history ===== */
  .rdo-item{border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px;background:#fff}
  .rdo-item .r-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .rdo-item .r-date{font-weight:700;color:var(--navy)}
  .rdo-item .r-clima{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--soft);color:var(--grey);font-weight:600}
  .rdo-item p{font-size:13px;margin:2px 0;color:#37414f}
  .rdo-item p b{color:var(--navy)}
  /* ===== Login ===== */
  #loginScreen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
    padding:20px;background:linear-gradient(160deg,#1f3050,#16243d)}
  .login-box{background:#fff;border-radius:18px;padding:34px 26px;width:100%;max-width:360px;
    text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35)}
  .login-logo{width:72px;height:72px;border-radius:16px;margin:0 auto 14px;object-fit:contain;display:block}
  .login-box b{display:block;font-size:20px;color:var(--navy)}
  .login-box>span{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--grey);margin-bottom:20px}
  .login-box input{margin-bottom:11px}
  .login-err{color:var(--red);font-size:13px;font-weight:600;margin-top:10px;min-height:18px}
  /* ===== Import contrato ===== */
  .import-zone{border:2px dashed #c6cfdd;border-radius:14px;padding:26px 18px;text-align:center;
    background:var(--soft);transition:.2s}
  .import-zone.drag{border-color:var(--orange);background:#fff6f0}
  .import-zone .iz-icon{width:46px;height:46px;border-radius:12px;margin:0 auto 12px;
    background:conic-gradient(from 200deg,#2EC5CE,#2E75B6,#1A2A45,#E8722A,#E84343,#E8722A,#2EC5CE);opacity:.9}
  .import-zone b{display:block;color:var(--navy);font-size:15px}
  .import-zone span{display:block;color:var(--grey);font-size:12px;margin-top:3px}
  .imp-msg{margin-top:14px;padding:12px 14px;border-radius:10px;font-size:13.5px;font-weight:600}
  .imp-msg.load{background:#eef4fb;color:var(--blue)}
  .imp-msg.err{background:#fdeeee;color:var(--red)}
  .imp-msg.ok{background:#f0faf4;color:var(--green)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid #cdd8e8;border-top-color:var(--blue);
    border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:7px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .review .r-field{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line)}
  .review .r-field label{flex:0 0 34%;margin:0;padding-top:9px}
  .review .r-field .r-input{flex:1}
  .conf{font-size:9.5px;padding:2px 7px;border-radius:20px;font-weight:700;margin-left:6px;vertical-align:1px}
  .conf.alta{background:#e3f5ea;color:var(--green)} .conf.media{background:#fdf3df;color:#a07700}
  .conf.baixa{background:#fdeaea;color:var(--red)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .chip{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12.5px;
    display:flex;align-items:center;gap:6px}
  .chip button{background:none;border:none;color:var(--red);cursor:pointer;font-size:15px;line-height:1;opacity:.6}
  .chip button:hover{opacity:1}
  /* ===== Gantt (tela) ===== */
  .gantt{margin-top:4px}
  .gantt-row,.gantt-head{display:flex;align-items:center;margin-bottom:7px}
  .gantt-name{flex:0 0 38%;padding-right:10px;font-weight:600;font-size:13px;overflow:hidden;
    white-space:nowrap;text-overflow:ellipsis}
  .gantt-track{flex:1;position:relative;height:24px;background:#eef1f5;border-radius:12px}
  .gantt-bar{position:absolute;top:0;height:24px;border-radius:12px;display:flex;align-items:center;
    justify-content:flex-end;padding-right:8px;transition:.4s;min-width:26px}
  .gantt-pct{color:#fff;font-size:11px;font-weight:700}
  .gantt-scale{background:none;font-size:11px;color:var(--grey)}
  .gantt-foot{font-size:11.5px;color:var(--grey);margin-top:8px}
  /* ===== Cronograma IA ===== */
  .cron-ia{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px}
  .cron-ia>label{font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.4px}
  /* ===== Plano semanal ===== */
  .semana-bloco{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px;background:var(--soft)}
  .semana-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .semana-titulo{flex:1;font-weight:700;font-size:14px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff}
  .semana-data{font-size:11.5px;color:var(--grey);white-space:nowrap}
  .semana-head .row-del{font-size:12px;font-weight:700;white-space:nowrap}
  @media(max-width:760px){.gantt-name{flex-basis:42%;font-size:12px}}
  @media print{.no-print{display:none!important}}
  /* ===== Frequência ===== */
  .freq-header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  .freq-header label{margin:0;font-size:13px}
  .freq-header input[type=date]{width:auto;padding:8px 12px;border-radius:10px;border:1px solid var(--line)}
  .freq-table{width:100%;border-collapse:collapse;min-width:480px}
  .freq-table th{background:var(--navy);color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:.5px;text-align:left;padding:10px 12px;font-weight:700;white-space:nowrap}
  .freq-table td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:middle;font-size:14px}
  .freq-table tr:hover{background:var(--soft)}
  .freq-table input[type=checkbox]{width:20px;height:20px;accent-color:var(--green);cursor:pointer}
  .freq-table input[type=time]{border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-size:13px;width:100px}
  .freq-resumo{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:14px}
  .freq-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;border-top:3px solid var(--blue)}
  .freq-card .fc-name{font-weight:700;font-size:13px;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .freq-card .fc-dias{font-size:20px;font-weight:800;color:var(--green);margin-top:2px}
  .freq-card .fc-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--grey)}
  .freq-empty{text-align:center;padding:30px;color:var(--grey);font-size:14px}
  @media(max-width:760px){
    .g2,.g3,.g4{grid-template-columns:1fr}
    .kpis{grid-template-columns:1fr 1fr}
    .etapa-bar .e-name{flex-basis:46%}
    .bar{padding:10px 14px}
  }
</style>
</head>

<script>
/* =========================================================
   MODELO DE DADOS (1 documento por obra, escrita por obraId
   — nunca sobrescreve a coleção inteira, evita perda de dados)
   ========================================================= */
const CHECKLIST_ABERTURA = [
  ["Contrato assinado e salvo na pasta da obra","Diretoria/Adm","Antes do início"],
  ["Orçamento aprovado separado por etapas","Adm/Orçamento","Antes do início"],
  ["Cronograma base validado","Gestor da obra","Antes do início"],
  ["Equipe definida por função","Gestor da obra","Antes do início"],
  ["Lista de materiais da primeira semana fechada","Gestor/Compras","Antes do início"],
  ["Materiais críticos comprados ou reservados","Compras","D-1"],
  ["Transporte/entrega dos materiais programado","Compras/Logística","D-1"],
  ["Ferramentas e equipamentos conferidos","Encarregado","D-1"],
  ["Uniforme entregue","Adm/Encarregado","D-1"],
  ["EPI entregue e assinado","Segurança/Encarregado","D-1"],
  ["Local isolado e sinalizado, quando necessário","Encarregado","D-1"],
  ["Ponto de energia, água e acesso confirmados","Gestor da obra","D-1"],
  ["Fotos iniciais feitas antes de executar","Encarregado","Dia 1"],
  ["Grupo WhatsApp da obra criado","Gestor da obra","Dia 1"],
  ["Rotina de relatório diário definida","Gestor/Encarregado","Dia 1"],
];
const ETAPAS_PADRAO = [
  "Mobilização / proteção / limpeza inicial",
  "Demolições / retiradas / preparação",
  "Infraestrutura / base / regularização",
  "Execução principal do escopo",
  "Acabamentos / arremates",
  "Limpeza final / testes / checklist",
  "Medição / entrega / fotos finais",
  "Pendências / garantia / aceite",
];
const LIBERACAO = [
  "Contrato e escopo conferidos",
  "Equipe definida",
  "Materiais da primeira semana garantidos",
  "EPI/uniforme/ferramentas conferidos",
  "Autorizado iniciar a obra",
];

function blankObra(nome,cliente){
  return {
    id:"obra_"+Date.now(),
    nome:nome||"", cliente:cliente||"",
    info:{endereco:"",responsavel:"",inicio:"",prazo:"",valor:"",mobilizacao:"Em preparação"},
    resumo:{escopo:"",pagamento:"",marcos:"",riscos:"",autorizacao:""},
    checklist:CHECKLIST_ABERTURA.map(c=>({item:c[0],resp:c[1],prazo:c[2],done:false})),
    equipe:[], materiais:[], epi:[],
    etapas:ETAPAS_PADRAO.map(n=>({nome:n,inicio:"",fim:"",equipe:"",materiais:"",status:"Não iniciado",avanco:0})),
    semanas:[{titulo:"Semana 1",inicio:"",dias:["Segunda","Terça","Quarta","Quinta","Sexta","Sábado"].map(d=>({dia:d,servico:"",equipe:"",material:"",meta:""}))}],
    liberacao:LIBERACAO.map(l=>({item:l,ok:false,resp:""})),
    frequencia:[],
    updated:Date.now()
  };
}

/* ===================== STORE ===================== */
let DB={obras:{}}, currentId=null, fb=null;

function lsLoad(){try{return JSON.parse(localStorage.getItem('knc_obras')||'{"obras":{}}')}catch(e){return {obras:{}}}}
function lsSave(){localStorage.setItem('knc_obras',JSON.stringify(DB))}

let saveTimeout;
function showSaveState(state){
  const el=document.getElementById('saveIndicator');
  if(!el)return;
  clearTimeout(saveTimeout);
  if(state==='saving'){
    el.style.display='inline-flex';
    el.style.background='rgba(46,117,182,.12)';
    el.style.color='var(--blue)';
    el.innerHTML='<span class="spin"></span>Salvando...';
  } else if(state==='saved'){
    el.style.display='inline-flex';
    el.style.background='rgba(46,158,91,.12)';
    el.style.color='var(--green)';
    el.innerHTML='✓ Salvo';
    saveTimeout=setTimeout(()=>{el.style.display='none';},2000);
  } else if(state==='error'){
    el.style.display='inline-flex';
    el.style.background='rgba(209,67,67,.12)';
    el.style.color='var(--red)';
    el.innerHTML='✕ Erro ao salvar';
    saveTimeout=setTimeout(()=>{el.style.display='none';},4000);
  }
}
async function persist(){
  DB.obras[currentId].updated=Date.now();
  showSaveState('saving');
  if(USE_FIREBASE && fb){
    try{
      await fb.setDoc(fb.doc(fb.db,"obras",currentId),DB.obras[currentId]);
      showSaveState('saved');
    }catch(e){showSaveState('error');toast("Erro ao salvar na nuvem","err");console.error(e);}
  } else { lsSave(); showSaveState('saved'); }
}

/* ===================== FIREBASE INIT ===================== */
let authMod=null;
async function initFirebase(){
  if(!USE_FIREBASE) { DB=lsLoad(); return true; }
  try{
    const app=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const fs =await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const au =await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const a=app.initializeApp(FIREBASE_CONFIG);
    const db=fs.getFirestore(a);
    fb={db,doc:fs.doc,setDoc:fs.setDoc,getDocs:fs.getDocs,collection:fs.collection};
    authMod={auth:au.getAuth(a),signIn:au.signInWithEmailAndPassword,
      onAuth:au.onAuthStateChanged,signOut:au.signOut};
    return true;
  }catch(e){
    console.error(e); toast("Firebase falhou — usando modo local","err");
    DB=lsLoad(); return true;
  }
}
async function loadObrasFromCloud(){
  if(!USE_FIREBASE||!fb)return;
  const snap=await fb.getDocs(fb.collection(fb.db,"obras"));
  DB={obras:{}}; snap.forEach(d=>DB.obras[d.id]=d.data());
  document.getElementById('cloud').classList.add('live');
  document.getElementById('cloudTxt').textContent='Nuvem';
}
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  const errEl=document.getElementById('loginErr');
  errEl.textContent='';
  if(!email||!pass){errEl.textContent='Preencha e-mail e senha';return;}
  try{
    await authMod.signIn(authMod.auth,email,pass);
    // onAuth cuida de mostrar o app
  }catch(e){
    errEl.textContent='E-mail ou senha inválidos';
  }
}
function doLogout(){ if(authMod) authMod.signOut(authMod.auth); }

/* ===================== NAVIGATION ===================== */
function go(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('v-'+v).classList.add('active');
  document.querySelector('.tab[data-view="'+v+'"]').classList.add('active');
  if(v==='abertura')renderAbertura();
  if(v==='frequencia')renderFrequencia();
  if(v==='painel')renderPainel();
  window.scrollTo({top:0,behavior:'smooth'});
}
function lockTabs(locked){
  ['t-ab','t-fr','t-pa'].forEach(id=>document.getElementById(id).disabled=locked);
}

/* ===================== OBRAS LIST ===================== */
function refreshObraSelect(){
  const sel=document.getElementById('obraSelect');
  const ids=Object.keys(DB.obras);
  sel.innerHTML='<option value="">— selecionar obra —</option>'+
    ids.map(id=>`<option value="${id}" ${id===currentId?'selected':''}>${esc(DB.obras[id].nome||'(sem nome)')}</option>`).join('');
}
function renderObraList(){
  const ids=Object.keys(DB.obras);
  const el=document.getElementById('obraList');
  if(!ids.length){el.innerHTML=`<div class="card"><div class="empty"><div class="e-emoji"></div><b>Nenhuma obra ainda</b>Crie a primeira obra acima para começar.</div></div>`;return;}
  el.innerHTML='<div class="card"><h2>Obras cadastradas</h2>'+ids.map(id=>{
    const o=DB.obras[id];
    const done=o.checklist.filter(c=>c.done).length, tot=o.checklist.length;
    const av=Math.round(o.etapas.reduce((s,e)=>s+(+e.avanco||0),0)/o.etapas.length);
    return `<div class="chk" style="cursor:pointer" onclick="openObra('${id}')">
      <div class="ci-main"><div class="ci-item">${esc(o.nome||'(sem nome)')}</div>
      <div class="ci-meta">${esc(o.cliente||'—')} · checklist ${done}/${tot} · avanço ${av}%</div></div>
      <span class="ci-resp">${esc(o.info.mobilizacao||'—')}</span></div>`;
  }).join('')+'</div>';
}
function createObra(){
  const nome=document.getElementById('newNome').value.trim();
  if(!nome){toast("Dê um nome à obra","err");return;}
  const o=blankObra(nome,document.getElementById('newCliente').value.trim());
  DB.obras[o.id]=o; currentId=o.id;
  document.getElementById('newNome').value='';document.getElementById('newCliente').value='';
  persist(); refreshObraSelect(); renderObraList(); lockTabs(false);
  toast("Obra criada"); go('abertura');
}
function openObra(id){ currentId=id; refreshObraSelect(); lockTabs(false); go('abertura'); }
function selectObra(id){ if(!id){currentId=null;lockTabs(true);return;} currentId=id; lockTabs(false);
  const active=document.querySelector('.tab.active').dataset.view;
  if(active!=='obras')go(active); else renderObraList(); }

/* ===================== ABERTURA ===================== */

  const i=o.info,r=o.resumo;
  document.getElementById('v-abertura').innerHTML=`
  <div class="card">
    <h2>Identificação</h2>
    <div class="grid g2">
      <div><label>Obra</label><input value="${esc(o.nome)}" onchange="setField('nome',this.value)"></div>
      <div><label>Cliente / Contrato</label><input value="${esc(o.cliente)}" onchange="setField('cliente',this.value)"></div>
      <div><label>Endereço</label><input value="${esc(i.endereco)}" onchange="setInfo('endereco',this.value)"></div>

    <h2>1 · Resumo executivo</h2>
    <p class="sub">Preencher antes de mobilizar. A obra só inicia após conferência dos itens críticos.</p>
    <div class="grid">
      <div><label>Escopo contratado (serviços e exclusões)</label><textarea onchange="setResumo('escopo',this.value)">${esc(r.escopo)}</textarea></div>

        <div><label>Medição e forma de pagamento</label><textarea onchange="setResumo('pagamento',this.value)">${esc(r.pagamento)}</textarea></div>
        <div><label>Prazo e marcos</label><textarea onchange="setResumo('marcos',this.value)">${esc(r.marcos)}</textarea></div>
        <div><label>Riscos principais</label><textarea onchange="setResumo('riscos',this.value)">${esc(r.riscos)}</textarea></div>

/* row templates */
function checklistRow(c,idx){return `<label class="chk ${c.done?'done':''}">
  <input type="checkbox" ${c.done?'checked':''} onchange="toggleChk(${idx},this.checked)">
  <div class="ci-main"><div class="ci-item">${esc(c.item)}</div><div class="ci-meta">Prazo: ${esc(c.prazo)}</div></div>
  <span class="ci-resp">${esc(c.resp)}</span></label>`;}
function equipeRow(x,idx){return `<tr>
  <td><input value="${esc(x.nome)}" onchange="setRow('equipe',${idx},'nome',this.value)"></td>
  <td><input value="${esc(x.funcao)}" onchange="setRow('equipe',${idx},'funcao',this.value)"></td>
  <td><input type="date" value="${esc(x.entrada)}" onchange="setRow('equipe',${idx},'entrada',this.value)"></td>
  <td><input value="${esc(x.diaria)}" onchange="setRow('equipe',${idx},'diaria',this.value)"></td>
  <td><input value="${esc(x.tel)}" onchange="setRow('equipe',${idx},'tel',this.value)"></td>
  <td><button class="row-del" onclick="delRow('equipe',${idx})">×</button></td></tr>`;}
function matRow(x,idx){return `<tr>
  <td><input value="${esc(x.nome)}" onchange="setRow('materiais',${idx},'nome',this.value)"></td>
  <td style="width:60px"><input value="${esc(x.qtd)}" onchange="setRow('materiais',${idx},'qtd',this.value)"></td>
  <td style="width:60px"><input value="${esc(x.un)}" onchange="setRow('materiais',${idx},'un',this.value)"></td>
  <td><input value="${esc(x.forn)}" onchange="setRow('materiais',${idx},'forn',this.value)"></td>
  <td><input type="date" value="${esc(x.comprar)}" onchange="setRow('materiais',${idx},'comprar',this.value)"></td>
  <td><select onchange="setRow('materiais',${idx},'status',this.value)">
    ${['Pendente','Cotado','Comprado','Entregue'].map(s=>`<option ${x.status===s?'selected':''}>${s}</option>`).join('')}</select></td>
  <td><button class="row-del" onclick="delRow('materiais',${idx})">×</button></td></tr>`;}
function epiRow(x,idx){const ck=(f)=>`<input type="checkbox" style="width:18px;height:18px;accent-color:var(--green)" ${x[f]?'checked':''} onchange="setRow('epi',${idx},'${f}',this.checked)">`;
  return `<tr>
  <td><input value="${esc(x.nome)}" onchange="setRow('epi',${idx},'nome',this.value)"></td>
  <td style="text-align:center">${ck('uniforme')}</td><td style="text-align:center">${ck('botina')}</td>
  <td style="text-align:center">${ck('capacete')}</td><td style="text-align:center">${ck('oculos')}</td>
  <td><button class="row-del" onclick="delRow('epi',${idx})">×</button></td></tr>`;}
function etapaRow(x,idx){return `<tr>
  <td style="min-width:160px;font-weight:600">${esc(x.nome)}</td>
  <td><input type="date" value="${esc(x.inicio)}" onchange="setRow('etapas',${idx},'inicio',this.value)"></td>
  <td><input type="date" value="${esc(x.fim)}" onchange="setRow('etapas',${idx},'fim',this.value)"></td>
  <td><input value="${esc(x.equipe)}" onchange="setRow('etapas',${idx},'equipe',this.value)"></td>
  <td style="width:90px"><input type="number" min="0" max="100" value="${x.avanco}" onchange="setEtapaAvanco(${idx},this.value)"></td>
  <td><select onchange="setRow('etapas',${idx},'status',this.value)">
    ${['Não iniciado','Em andamento','Concluído'].map(s=>`<option ${x.status===s?'selected':''}>${s}</option>`).join('')}</select></td></tr>`;}
function semanasHTML(o){
  const semanas=getSemanas(o);
  if(!semanas.length)return `<div class="empty"><b>Nenhuma semana</b>Adicione uma semana ou gere pelo cronograma.</div>`;
  return semanas.map((sem,si)=>`<div class="semana-bloco">
    <div class="semana-head">
      <input class="semana-titulo" value="${esc(sem.titulo)}" onchange="setSemanaTitulo(${si},this.value)" placeholder="Semana ${si+1}">
      ${sem.inicio?`<span class="semana-data">início ${fmtDate(sem.inicio)}</span>`:''}
      <button class="row-del" title="Remover semana" onclick="delSemana(${si})">× remover</button>
    </div>
    <div class="tbl-wrap"><table><thead><tr>
      <th>Dia</th><th>Serviços do dia</th><th>Equipe</th><th>Material</th><th>Meta do dia</th>
    </tr></thead><tbody>${sem.dias.map((d,di)=>`<tr>
      <td style="font-weight:600;white-space:nowrap">${esc(d.dia)}</td>
      <td><input value="${esc(d.servico)}" onchange="setSemanaDia(${si},${di},'servico',this.value)"></td>
      <td><input value="${esc(d.equipe)}" onchange="setSemanaDia(${si},${di},'equipe',this.value)"></td>
      <td><input value="${esc(d.material)}" onchange="setSemanaDia(${si},${di},'material',this.value)"></td>
      <td><input value="${esc(d.meta)}" onchange="setSemanaDia(${si},${di},'meta',this.value)"></td>
    </tr>`).join('')}</tbody></table></div>
  </div>`).join('');
}
// compat: obras antigas têm o.semana (array de dias). Converte em runtime.
function getSemanas(o){
  if(Array.isArray(o.semanas))return o.semanas;
  if(Array.isArray(o.semana)){o.semanas=[{titulo:"Semana 1",inicio:"",dias:o.semana}];return o.semanas;}
  o.semanas=[{titulo:"Semana 1",inicio:"",dias:["Segunda","Terça","Quarta","Quinta","Sexta","Sábado"].map(d=>({dia:d,servico:"",equipe:"",material:"",meta:""}))}];
  return o.semanas;
}
function novaSemana(titulo,inicio){return {titulo:titulo||"Semana",inicio:inicio||"",
  dias:["Segunda","Terça","Quarta","Quinta","Sexta","Sábado"].map(d=>({dia:d,servico:"",equipe:"",material:"",meta:""}))};}
function addSemana(){const o=DB.obras[currentId];const s=getSemanas(o);
  s.push(novaSemana("Semana "+(s.length+1),""));persist();
  document.getElementById('semanasWrap').innerHTML=semanasHTML(o);}
function delSemana(i){const o=DB.obras[currentId];const s=getSemanas(o);
  if(!confirm('Remover esta semana?'))return;s.splice(i,1);persist();
  document.getElementById('semanasWrap').innerHTML=semanasHTML(o);}
function setSemanaTitulo(i,v){const o=DB.obras[currentId];getSemanas(o)[i].titulo=v;persist();}
function setSemanaDia(i,j,campo,v){const o=DB.obras[currentId];getSemanas(o)[i].dias[j][campo]=v;persist();}
function gerarSemanas(){
  const o=DB.obras[currentId];
  const datas=o.etapas.map(e=>[parseDate(e.inicio),parseDate(e.fim)]).flat().filter(Boolean);
  if(!datas.length){toast('Preencha as datas das etapas no cronograma (seção 6) primeiro','err');return;}
  const min=new Date(Math.min(...datas)),max=new Date(Math.max(...datas));
  const totalDias=Math.round((max-min)/86400000)+1;
  const n=Math.max(1,Math.ceil(totalDias/7));
  const atual=getSemanas(o);
  const temConteudo=atual.some(s=>s.dias.some(d=>d.servico||d.equipe||d.material||d.meta));
  if(temConteudo && !confirm('Isso vai substituir as semanas atuais e o que já foi digitado. Continuar?'))return;
  const novas=[];
  for(let i=0;i<n;i++){
    const ini=new Date(min.getTime()+i*7*86400000);
    const iso=ini.getFullYear()+'-'+('0'+(ini.getMonth()+1)).slice(-2)+'-'+('0'+ini.getDate()).slice(-2);
    novas.push(novaSemana("Semana "+(i+1),iso));
  }
  o.semanas=novas;persist();
  document.getElementById('semanasWrap').innerHTML=semanasHTML(o);
  toast(n+' semana(s) geradas');
}

        <td style="font-weight:600">${esc(c.nome)}</td>
        <td style="color:var(--grey);font-size:13px">${esc(c.funcao)}</td>

    const allDates=[...new Set(freq.map(f=>f.data))].sort();

      const dias=freq.filter(f=>f.colab===c.nome&&f.presente).length;
      const meses=Math.floor(dias/22); // ~22 dias úteis por mês
      const semanas=Math.floor((dias%22)/5); // ~5 dias úteis por semana
      const diasRest=dias%5;
      contagem[c.nome]={dias,meses,semanas,diasRest};
    });

    html+=`<div style="margin-top:18px"><h2 style="margin-bottom:10px">Resumo de frequência</h2>
      <p class="sub">Total de ${allDates.length} dia(s) com registro</p>

      </tr></thead><tbody>`;

  html+=`</div>`;

function freqChangeDate(d){
  freqDate=d;
  renderFrequencia();
}

function freqToggle(nome,presente){
  const o=DB.obras[currentId];if(!o)return;
  if(!o.frequencia)o.frequencia=[];
  const idx=o.frequencia.findIndex(f=>f.data===freqDate&&f.colab===nome);
  if(idx>=0){
    o.frequencia[idx].presente=presente;
    if(!presente){o.frequencia[idx].entrada='';}
  } else {
    o.frequencia.push({data:freqDate,colab:nome,presente:presente,entrada:'',obs:''});
  }
  persist();
  renderFrequencia();
}

function freqSetHora(nome,hora){
  const o=DB.obras[currentId];if(!o)return;
  if(!o.frequencia)o.frequencia=[];
  const idx=o.frequencia.findIndex(f=>f.data===freqDate&&f.colab===nome);
  if(idx>=0){
    o.frequencia[idx].entrada=hora;
  } else {
    o.frequencia.push({data:freqDate,colab:nome,presente:true,entrada:hora,obs:''});
  }
  persist();
}

function freqSetObs(nome,obs){
  const o=DB.obras[currentId];if(!o)return;
  if(!o.frequencia)o.frequencia=[];
  const idx=o.frequencia.findIndex(f=>f.data===freqDate&&f.colab===nome);

    o.frequencia[idx].obs=obs;
  } else {
    o.frequencia.push({data:freqDate,colab:nome,presente:false,entrada:'',obs:obs});
  }
  persist();
}

/* ===================== CRONOGRAMA POR IA ===================== */
const API_CRONOGRAMA = "/api/ler-cronograma";
let cronExtraido=null;
function cronMsg(html,cls){document.getElementById('cronStatus').innerHTML=
  html?`<div class="imp-msg ${cls||''}">${html}</div>`:'';}
async function lerCronograma(){
  const t=document.getElementById('cronTexto').value.trim();
  if(!t){toast('Cole o texto do cronograma','err');return;}
  cronMsg('<span class="spin"></span>Lendo o cronograma...','load');
  try{
    const r=await fetch(API_CRONOGRAMA,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({texto:t})});
    if(!r.ok){
      const e=await r.json().catch(()=>({}));
      if(r.status===404||r.status===405){cronMsg('A leitura por IA precisa da função publicada no Vercel (/api/ler-cronograma). No modo local ela não responde.','err');return;}
      cronMsg('Erro: '+esc(e.error||('HTTP '+r.status)),'err');return;
    }
    const data=await r.json();
    if(!data.ok||!data.dados||!Array.isArray(data.dados.etapas)){cronMsg('A IA não retornou etapas utilizáveis.','err');return;}
    cronExtraido=data.dados.etapas;
    mostrarRevisaoCron(data.dados);
  }catch(e){cronMsg('Sem conexão com a função de leitura. No modo local isso é esperado — publique no Vercel.','err');}
}
function mostrarRevisaoCron(d){
  const obs=d.observacoes?`<p style="font-size:12px;color:var(--grey);margin:6px 0">${esc(d.observacoes)}</p>`:'';
  const rows=(d.etapas||[]).map((e,i)=>`<tr>
    <td><input value="${esc(e.nome||'')}" onchange="cronEdit(${i},'nome',this.value)"></td>
    <td style="width:130px"><input type="date" value="${esc(e.inicio||'')}" onchange="cronEdit(${i},'inicio',this.value)"></td>
    <td style="width:130px"><input type="date" value="${esc(e.fim||'')}" onchange="cronEdit(${i},'fim',this.value)"></td>
    <td><button class="row-del" onclick="cronDel(${i})">×</button></td></tr>`).join('');
  document.getElementById('cronStatus').innerHTML=`
    <div class="imp-msg ok" style="margin-bottom:6px">✓ Cronograma interpretado pela IA. Revise e ajuste — é interpretação, não verdade contratual.</div>
    ${obs}
    <div class="tbl-wrap"><table><thead><tr><th>Etapa</th><th>Início</th><th>Fim</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table></div>
    <div class="btns" style="margin-top:10px">
      <button class="btn btn-primary" onclick="aplicarCronograma()">Aplicar ao cronograma</button>
      <button class="btn btn-ghost" onclick="cronMsg('')">Cancelar</button>
    </div>`;
}
function cronEdit(i,campo,v){cronExtraido[i][campo]=v;}
function cronDel(i){cronExtraido.splice(i,1);mostrarRevisaoCron({etapas:cronExtraido});}
function aplicarCronograma(){
  const o=DB.obras[currentId];
  const etapas=(cronExtraido||[]).filter(e=>e.nome&&e.nome.trim());
  if(!etapas.length){toast('Nenhuma etapa para aplicar','err');return;}
  if(o.etapas.some(e=>e.inicio||e.fim||+e.avanco>0) && !confirm('Isso substitui o cronograma atual. Continuar?'))return;
  o.etapas=etapas.map(e=>({nome:e.nome,inicio:e.inicio||'',fim:e.fim||'',equipe:'',materiais:'',status:'Não iniciado',avanco:0}));
  persist();cronExtraido=null;document.getElementById('cronTexto').value='';
  toast('Cronograma aplicado');renderAbertura();
}

/* ===================== GANTT ===================== */
function parseDate(s){if(!s)return null;const p=String(s).split('-');if(p.length!==3)return null;
  const d=new Date(+p[0],+p[1]-1,+p[2]);return isNaN(d)?null:d;}
function ganttHTML(o){
  const items=o.etapas.map(e=>({nome:e.nome,ini:parseDate(e.inicio),fim:parseDate(e.fim),av:+e.avanco||0}))
    .filter(e=>e.ini&&e.fim&&e.fim>=e.ini);
  const semData=o.etapas.length-items.length;
  if(!items.length){
    return `<div class="empty"><b>Sem datas para montar o Gantt</b>Preencha início e fim das etapas na aba Abertura (seção 6). A linha do tempo de avanço abaixo funciona mesmo sem datas.</div>`;
  }
  const min=new Date(Math.min(...items.map(i=>i.ini)));
  const max=new Date(Math.max(...items.map(i=>i.fim)));
  const totalMs=Math.max(1,max-min);
  const dias=Math.round(totalMs/86400000)+1;
  const color=(p)=>p>=100?'#2E9E5B':p>0?'#E0A800':'#9aa6b5';
  const rows=items.map(e=>{
    const left=((e.ini-min)/totalMs)*100;
    const width=Math.max(((e.fim-e.ini)/totalMs)*100,2);
    return `<div class="gantt-row">
      <div class="gantt-name">${esc(e.nome)}</div>
      <div class="gantt-track">
        <div class="gantt-bar" style="left:${left}%;width:${width}%;background:${color(e.av)}">
          <span class="gantt-pct">${e.av}%</span>
        </div>
      </div>
    </div>`;
  }).join('');
  const fmtBR=(d)=>('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2);
  return `<div class="gantt">
    <div class="gantt-head"><div class="gantt-name"></div>
      <div class="gantt-track gantt-scale"><span>${fmtBR(min)}</span><span style="float:right">${fmtBR(max)}</span></div></div>
    ${rows}
    <div class="gantt-foot">Período: ${fmtBR(min)} a ${fmtBR(max)} · ${dias} dias${semData?` · ${semData} etapa(s) sem data não exibida(s)`:''}</div>
  </div>`;
}

/* ===================== IMPORTAR CONTRATO ===================== */
let lastExtract=null;

function impMsg(html,cls){document.getElementById('importStatus').innerHTML=
  html?`<div class="imp-msg ${cls||''}">${html}</div>`:'';}

async function readPastedText(){
  const t=document.getElementById('pasteText').value.trim();
  if(!t){toast('Cole o texto do contrato','err');return;}
  impMsg('<span class="spin"></span>Analisando o contrato...','load');
  await callContrato({texto:t});
}

async function callContrato(payload){
  impMsg('<span class="spin"></span>Extraindo dados com IA...','load');
  try{
    const r=await fetch(API_CONTRATO,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!r.ok){
      const e=await r.json().catch(()=>({}));
      if(r.status===404||r.status===405){
        impMsg('A leitura por IA precisa da função no Vercel publicada. Aqui no modo local, ela ainda não responde — faça o deploy (veja o guia) ou use os dados manualmente.','err');
        return;
      }
      impMsg('Erro: '+esc(e.error||('HTTP '+r.status)),'err');return;
    }
    const data=await r.json();
    if(!data.ok||!data.dados){impMsg('A IA não retornou dados utilizáveis.','err');return;}
    lastExtract=data.dados;
    showReview(data.dados);
  }catch(e){
    impMsg('Sem conexão com a função de leitura. No modo local isso é esperado — publique no Vercel para ativar.','err');
  }
}

function showReview(d){
  const conf=d.confianca||{};
  const badge=(k)=>conf[k]?`<span class="conf ${conf[k]}">${conf[k]}</span>`:'';
  const field=(key,label,val)=>`<div class="r-field"><label>${label}${badge(key)}</label>
    <div class="r-input"><input id="rev_${key}" value="${esc(val||'')}"></div></div>`;
  const etapas=(d.etapas||[]);
  document.getElementById('importStatus').innerHTML=`
  <div class="imp-msg ok" style="margin-bottom:6px">✓ Contrato lido. Revise antes de criar a obra — campos marcados <span class="conf baixa">baixa</span> a IA deduziu.</div>
  <div class="review">
    ${field('nome','Obra',d.nome)}
    ${field('cliente','Cliente',d.cliente)}
    ${field('endereco','Endereço',d.endereco)}
    ${field('valor','Valor',d.valor)}
    ${field('prazo','Prazo',d.prazo)}
    ${field('inicio','Início (AAAA-MM-DD)',d.inicio)}
    <div class="r-field"><label>Escopo</label><div class="r-input"><textarea id="rev_escopo">${esc(d.escopo||'')}</textarea></div></div>
    <div class="r-field"><label>Pagamento</label><div class="r-input"><textarea id="rev_pagamento">${esc(d.pagamento||'')}</textarea></div></div>
    <div class="r-field"><label>Etapas sugeridas</label><div class="r-input">
      <div class="chips" id="revChips">${etapas.map((e,i)=>`<span class="chip">${esc(e)}<button onclick="removeChip(${i})">×</button></span>`).join('')}</div>
      <input id="newEtapa" placeholder="+ adicionar etapa e Enter" style="margin-top:8px" onkeydown="if(event.key==='Enter'){addChip();event.preventDefault();}">
    </div></div>
    <div class="r-field"><label>Materiais sugeridos</label><div class="r-input">
      <div class="chips" id="revMats">${(d.materiais||[]).map((m,i)=>`<span class="chip">${esc(typeof m==='string'?m:(m.nome+(m.un?' ('+m.un+')':'')))}<button onclick="removeMat(${i})">×</button></span>`).join('')}</div>
      <input id="newMat" placeholder="+ adicionar material e Enter" style="margin-top:8px" onkeydown="if(event.key==='Enter'){addMatChip();event.preventDefault();}">
    </div></div>
  </div>
  <div class="btns" style="margin-top:14px">
    <button class="btn btn-primary" onclick="createFromContract()">Criar obra com estes dados</button>
    <button class="btn btn-ghost" onclick="impMsg('')">Cancelar</button>
  </div>`;
}
function removeChip(i){lastExtract.etapas.splice(i,1);showReview(lastExtract);}
function addChip(){const v=document.getElementById('newEtapa').value.trim();if(!v)return;
  lastExtract.etapas=lastExtract.etapas||[];lastExtract.etapas.push(v);showReview(lastExtract);}
function removeMat(i){lastExtract.materiais.splice(i,1);showReview(lastExtract);}
function addMatChip(){const v=document.getElementById('newMat').value.trim();if(!v)return;
  lastExtract.materiais=lastExtract.materiais||[];lastExtract.materiais.push({nome:v,un:'',etapa:''});showReview(lastExtract);}

function createFromContract(){
  const g=(k)=>{const el=document.getElementById('rev_'+k);return el?el.value.trim():'';};
  const o=blankObra(g('nome')||'Obra sem nome',g('cliente'));
  o.info.endereco=g('endereco');o.info.valor=g('valor');o.info.prazo=g('prazo');o.info.inicio=g('inicio');
  o.resumo.escopo=g('escopo');o.resumo.pagamento=g('pagamento');
  const etapas=(lastExtract.etapas||[]).filter(Boolean);
  if(etapas.length){
    o.etapas=etapas.map(n=>({nome:n,inicio:'',fim:'',equipe:'',materiais:'',status:'Não iniciado',avanco:0}));
  }
  const mats=(lastExtract.materiais||[]).filter(Boolean);
  if(mats.length){
    o.materiais=mats.map(m=>{
      const obj=(typeof m==='string')?{nome:m,un:''}:m;
      return {nome:obj.nome||'',qtd:'',un:obj.un||'',forn:'',comprar:'',status:'Pendente'};
    });
  }
  DB.obras[o.id]=o;currentId=o.id;
  persist();refreshObraSelect();renderObraList();lockTabs(false);
  impMsg('');document.getElementById('pasteText').value='';lastExtract=null;
  toast('Obra criada a partir do contrato');go('abertura');
}

/* ===================== UTIL ===================== */
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function val(id){return document.getElementById(id).value;}
function fmtDate(d){if(!d)return '';const p=String(d).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d;}
let toastT;
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;
  t.className='toast show'+(type==='err'?' err':'');clearTimeout(toastT);
  toastT=setTimeout(()=>t.className='toast'+(type==='err'?' err':''),2400);}

/* ===================== BOOT ===================== */
function startApp(){
  seedDemo();
  refreshObraSelect();
  renderObraList();
  const ids=Object.keys(DB.obras);
  if(ids.length){currentId=ids[0];refreshObraSelect();lockTabs(false);}
  document.getElementById('app').style.display='';
  document.getElementById('loginScreen').style.display='none';
  if(USE_FIREBASE && authMod) document.getElementById('logoutBtn').style.display='';
}
(async function(){
  await initFirebase();
  if(USE_FIREBASE && authMod){
    // espera o estado de auth: logado → carrega nuvem e abre; deslogado → tela de login
    authMod.onAuth(authMod.auth, async (user)=>{
      if(user){
        try{ await loadObrasFromCloud(); }catch(e){ console.error(e); }
        startApp();
      }else{
        document.getElementById('app').style.display='none';
        document.getElementById('loginScreen').style.display='flex';
      }
    });
  }else{
    // modo local: sem login
    startApp();
  }
})();
</script>
